spring.application.name=job-query-service
server.port=8083

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/asyncjobdb}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Liquibase - query service only reads, no migrations
spring.liquibase.enabled=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}